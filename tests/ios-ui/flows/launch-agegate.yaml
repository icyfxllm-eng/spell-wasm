# Maestro flow: launch → age gate (both paths) → main menu.
# Run: maestro test tests/ios-ui/flows/launch-agegate.yaml
# Simulator matrix is pinned in fastlane (lane :ui_tests). This flow asserts the
# DOB prompt appears cold and that an adult date reaches the main menu.
appId: net.spellgame.app
---
- launchApp:
    clearState: true            # fresh install → age gate must appear
- assertVisible:
    id: "ageScrim"              # the DOB prompt
- tapOn:
    id: "ageMonth"
- # (Maestro can't drive a native <select> in a WKWebView reliably; the age
  # selects are DOM <select>. XCUITest covers the picker interaction — see
  # tests/ios-ui/README.md. Here we assert the gate is present + blocking.)
- assertVisible:
    id: "ageSubmit"
